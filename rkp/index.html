<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
     <div class="choice" id="rock"><img src="./stone.jpeg" alt="rock"></div>
     <div class="choice" id="paper"><img src="./paper.jpeg" alt="paper"></div>
     <div class="choice" id="scissors"><img src="./scissors.jpeg" alt="scissors"></div>
    </div>
    <div class="score-container">
        <div>
            <p id="userScore">0</p>
            <p>User</p>
        </div>
        <div>
            <p id="compScore">0</p>
            <p>Computer</p>
        </div>
    </div>
    <div class="msgBox">
        <p id="msg">Play your move!</p>
    </div>
  <script src="./script.js"></script>  
</body>
</html>
